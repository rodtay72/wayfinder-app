<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Wayfinder Owner Admin</title>
 <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
 <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
 <meta name="theme-color" content="#2f473d">
 <meta name="robots" content="noindex,nofollow">

 <!-- Styles -->
 <link rel="stylesheet" href="styles.css">

 <!-- React & Babel (for JSX) -->
 <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
 <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
 <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>

 <!-- Supabase -->
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
 <div id="root"></div>

 <!-- Load content configuration -->
 <script src="content.js"></script>

 <!-- Load images -->
 <script src="images.js"></script>

 <!-- Load Supabase client -->
 <script src="supabase.js"></script>

 <!-- Set portal role before loading app -->
 <script>var PORTAL_ROLE = 'admin';</script>

 <!-- Load main application -->
 <script type="text/babel" data-presets="env,react" src="app.js"></script>
 <script type="text/babel" data-presets="env,react">ReactDOM.render(<App/>, document.getElementById('root'));</script>
</body>
</html>
