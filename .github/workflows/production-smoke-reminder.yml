name: Production Smoke Reminder

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

permissions:
  contents: read
  issues: write

env:
  PRODUCTION_URL: https://wayfinder-modular.vercel.app
  ISSUE_TITLE: Production smoke reminder — manual checklist
  ISSUE_LABEL: production-watch
  ISSUE_MARKER: '<!-- wayfinder-production-smoke-reminder -->'

jobs:
  production-smoke-reminder:
    name: production-smoke-reminder
    runs-on: ubuntu-latest

    steps:
      - name: Public production URL heartbeat
        id: heartbeat
        continue-on-error: true
        run: |
          set +e
          OUTPUT="$(curl --fail --silent --show-error --location --max-time 30 \
            --write-out '\nhttp_code=%{http_code}\ntime_total=%{time_total}\n' \
            "${PRODUCTION_URL}" 2>&1)"
          EXIT_CODE=$?
          HTTP_CODE="$(printf '%s' "$OUTPUT" | sed -n 's/^http_code=//p' | tail -n 1)"
          TIME_TOTAL="$(printf '%s' "$OUTPUT" | sed -n 's/^time_total=//p' | tail -n 1)"
          if [ -z "$HTTP_CODE" ]; then
            HTTP_CODE="unknown"
          fi
          if [ -z "$TIME_TOTAL" ]; then
            TIME_TOTAL="unknown"
          fi
          {
            echo "exit_code=$EXIT_CODE"
            echo "http_code=$HTTP_CODE"
            echo "time_total=$TIME_TOTAL"
            echo "curl_output<<EOF"
            printf '%s\n' "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write step summary
        env:
          EXIT_CODE: ${{ steps.heartbeat.outputs.exit_code }}
          HTTP_CODE: ${{ steps.heartbeat.outputs.http_code }}
          TIME_TOTAL: ${{ steps.heartbeat.outputs.time_total }}
          CURL_OUTPUT: ${{ steps.heartbeat.outputs.curl_output }}
        run: |
          set -euo pipefail
          if [ "$EXIT_CODE" = "0" ]; then
            RESULT="pass"
          else
            RESULT="fail"
          fi
          {
            echo "## Production smoke reminder"
            echo
            echo "**Trigger:** \`${{ github.event_name }}\`"
            echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "**Production URL:** ${PRODUCTION_URL}"
            echo
            echo "### Public URL heartbeat"
            echo
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Result | ${RESULT} |"
            echo "| HTTP code | ${HTTP_CODE} |"
            echo "| Response time (s) | ${TIME_TOTAL} |"
            echo
            if [ "$RESULT" = "fail" ]; then
              echo "Heartbeat failed. Details:"
              echo '```'
              printf '%s\n' "$CURL_OUTPUT"
              echo '```'
              echo
            fi
            echo "### Manual checks still required"
            echo
            echo "This workflow performs a **public GET only**. It does **not** test:"
            echo
            echo "- auth / sign-in / session"
            echo "- journal save/read"
            echo "- dashboard loading"
            echo "- Journal Trail"
            echo
            echo "Those checks remain **manual** owner actions after user-facing merges."
            echo
            echo "### Manual smoke checklist"
            echo
            echo "1. Verified user can sign in."
            echo "2. Dashboard loads Parent ID, children, past activities, reflections."
            echo "3. Journal save appears in Journal Trail."
            echo "4. Sign-out works; unverified email blocked."
            echo "5. No parent email or Supabase UUID in normal UI."
            echo "6. Decode a Moment and ALIGN Journey still usable if touched."
            echo "7. Mobile layout readable."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert reusable production smoke reminder issue
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && steps.heartbeat.outputs.exit_code != '0')
        uses: actions/github-script@v7
        env:
          EXIT_CODE: ${{ steps.heartbeat.outputs.exit_code }}
          HTTP_CODE: ${{ steps.heartbeat.outputs.http_code }}
          TIME_TOTAL: ${{ steps.heartbeat.outputs.time_total }}
          CURL_OUTPUT: ${{ steps.heartbeat.outputs.curl_output }}
        with:
          script: |
            const marker = process.env.ISSUE_MARKER;
            const title = process.env.ISSUE_TITLE;
            const label = process.env.ISSUE_LABEL;
            const productionUrl = process.env.PRODUCTION_URL;
            const passed = process.env.EXIT_CODE === '0';
            const httpCode = process.env.HTTP_CODE || 'unknown';
            const timeTotal = process.env.TIME_TOTAL || 'unknown';
            const curlOutput = process.env.CURL_OUTPUT || '';
            const trigger = context.eventName;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const timestamp = new Date().toISOString();

            const body = `${marker}
            ## Production smoke reminder

            **Last run:** ${timestamp}
            **Trigger:** \`${trigger}\`
            **Workflow run:** ${runUrl}
            **Production URL:** ${productionUrl}

            ### Public URL heartbeat

            | Field | Value |
            |-------|-------|
            | Result | ${passed ? 'pass' : 'fail'} |
            | HTTP code | ${httpCode} |
            | Response time (s) | ${timeTotal} |

            ${passed ? '' : `### Heartbeat failure details\n\n\`\`\`\n${curlOutput}\n\`\`\`\n`}

            ### Manual checks still required

            This workflow performs a **public GET only**. It does **not** test auth, journal save/read, dashboard loading, or Journal Trail. Those checks remain **manual** owner actions.

            ### Manual smoke checklist

            - [ ] Verified user can sign in.
            - [ ] Dashboard loads Parent ID, children, past activities, reflections.
            - [ ] Journal save appears in Journal Trail.
            - [ ] Sign-out works; unverified email blocked.
            - [ ] No parent email or Supabase UUID in normal UI.
            - [ ] Decode a Moment and ALIGN Journey still usable if touched.
            - [ ] Mobile layout readable.

            **Do not mark smoke as passed automatically.** Confirm manually and note results here.

            ### Related docs

            - [docs/CURRENT_LAUNCH_STATUS.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/docs/CURRENT_LAUNCH_STATUS.md)
            - [docs/PLATFORM_SYNC_PRODUCTION_OPS.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/docs/PLATFORM_SYNC_PRODUCTION_OPS.md)
            - [docs/AGENT_HANDOFF_BRIEF.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/docs/AGENT_HANDOFF_BRIEF.md)
            `;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 100
            });

            const existing = issues.find((issue) => issue.body && issue.body.includes(marker));

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body
              });
              core.info(`Updated reusable issue #${existing.number}.`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label]
              });
              core.info(`Created reusable issue #${created.number}.`);
            }

      - name: Fail on heartbeat error
        if: steps.heartbeat.outputs.exit_code != '0'
        run: |
          echo "::error::Public production URL heartbeat failed."
          exit 1
