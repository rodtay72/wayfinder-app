<head>

 <!-- Styles -->

 <!-- React & Babel (for JSX) -->
 <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
 <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
 <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>

 <!-- Supabase -->
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
 <script>
 (function(){
  try{
   var params=new URLSearchParams(window.location.search);
   var hash=window.location.hash&&window.location.hash.charAt(0)==='#'?window.location.hash.slice(1):'';
   var hashParams=hash?new URLSearchParams(hash):null;
   var token=params.get('mhp_invite')||params.get('invite')||(hashParams&&(hashParams.get('mhp_invite')||hashParams.get('invite')));
   if(token&&String(token).trim()){
    window.location.replace('/counsellor.html?mhp_invite='+encodeURIComponent(String(token).trim())+'&setup=profile');
   }
  }catch(e){}
 })();
 </script>
 <div id="root"></div>

 <!-- Load content configuration (edit this file for text changes!) -->
 <script src="content.js"></script>

 <!-- Load images -->
 <script src="images.js"></script>

 <!-- Load Supabase client -->
 <script src="supabase.js"></script>

 <!-- Set portal role -->
 <script>var PORTAL_ROLE = 'parent';</script>

 <!-- Load main application -->
 <script type="text/babel" data-presets="env,react" src="app.js"></script>
 <script type="text/babel" data-presets="env,react">ReactDOM.render(<App/>, document.getElementById('root'));</script>
</body>
</html>
