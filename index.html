<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Way Finder</title>
 <link rel="manifest" href="/manifest-parent.webmanifest">
 <link rel="apple-touch-icon" href="/icons/parent/apple-touch-icon.png">
 <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
 <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
 <meta name="theme-color" content="#2f473d">
 <meta name="mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-title" content="Wayfinder Parent">
 <meta name="apple-mobile-web-app-status-bar-style" content="default">
 
 <!-- Styles -->
 <link rel="stylesheet" href="styles.css">
 
 <!-- React & Babel (for JSX) -->
 <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
 <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
 <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>

 <!-- Supabase -->
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
 <div id="root"></div>

 <!-- Load content configuration (edit this file for text changes!) -->
 <script src="content.js"></script>

 <!-- Load images -->
 <script src="images.js"></script>

 <!-- Load Supabase client -->
 <script src="supabase.js"></script>

 <!-- Set portal role -->
 <script>var PORTAL_ROLE = 'parent';</script>

 <!-- Load main application -->
 <script type="text/babel" data-presets="env,react" src="app.js"></script>
 <script type="text/babel" data-presets="env,react">ReactDOM.render(<App/>, document.getElementById('root'));</script>
</body>
</html>
